name = "DigitalOcean Personal Access Token"
description = "DigitalOcean PAT. Grants full API access to manage cloud resources."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(dop_v1_[a-f0-9]{64})\b'''
keywords = ["dop_v1_"]

[[patterns]]
id = "cloud/digitalocean-refresh-token"
group = "cloud"
name = "DigitalOcean OAuth Refresh Token"
description = "DigitalOcean refresh token. Can be exchanged for new access tokens."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b(dor_v1_[a-f0-9]{64})\b'''
keywords = ["dor_v1_"]

[[patterns]]
id = "cloud/netlify-personal-access-token"
group = "cloud"
name = "Netlify Personal Access Token"
description = "Netlify PAT (nfp_ prefix). Grants full API access to deploy sites and manage account."
severity = "critical"
default_enabled = true
min_entropy = 3.5
regex = '''\b(nfp_[a-zA-Z0-9]{36,40})\b'''
keywords = ["nfp_"]

[[patterns]]
id = "cloud/supabase-access-token"
group = "cloud"
name = "Supabase Access Token"
description = "Supabase personal access token (sbp_ prefix). Grants Management API access to projects."
severity = "critical"
default_enabled = true
min_entropy = 3.5
regex = '''\b(sbp_[a-f0-9]{40})\b'''
keywords = ["sbp_"]

[[patterns]]
id = "cloud/supabase-secret-key"
group = "cloud"
name = "Supabase Secret Key"
description = "Supabase secret API key (sb_secret_ prefix). Grants privileged database access, bypasses RLS."
severity = "critical"
default_enabled = true
min_entropy = 3.5
regex = '''\b(sb_secret_[a-zA-Z0-9_-]{20,})\b'''
keywords = ["sb_secret_"]

# =============================================================================
# Communication Platforms
# =============================================================================

[[patterns]]
id = "comms/slack-app-token"
group = "comms"
name = "Slack App-Level Token"
description = "Slack app token (xoxa-). Used for Socket Mode and app-level APIs."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxa-[0-9]+-[a-zA-Z0-9-]+)\b'''
keywords = ["xoxa-"]

[[patterns]]
id = "comms/slack-bot-token"
group = "comms"
name = "Slack Bot Token"
description = "Slack bot token (xoxb-). Allows posting messages and interacting with workspace."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24})\b'''
keywords = ["xoxb-"]

[[patterns]]
id = "comms/slack-config-token"
group = "comms"
name = "Slack Configuration Token"
description = "Slack config token (xoxe-). Used for app manifest and configuration APIs."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxe\.xoxp-[0-9]+-[a-zA-Z0-9-]+)\b'''
keywords = ["xoxe."]

[[patterns]]
id = "comms/slack-legacy-token"
group = "comms"
name = "Slack Legacy Token"
description = "Slack legacy token (xoxs-). Deprecated but functional with broad workspace access."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxs-[0-9]+-[a-zA-Z0-9-]+)\b'''
keywords = ["xoxs-"]

[[patterns]]
id = "comms/slack-refresh-token"
group = "comms"
name = "Slack Refresh Token"
description = "Slack refresh token (xoxr-). Long-lived token to obtain new access tokens."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxr-[0-9]+-[a-zA-Z0-9-]+)\b'''
keywords = ["xoxr-"]

[[patterns]]
id = "comms/slack-user-token"
group = "comms"
name = "Slack User Token"
description = "Slack user token (xoxp-). Grants access on behalf of user including private channels."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(xoxp-[0-9]{10,13}-[0-9]{10,13}-[0-9]{10,13}-[a-f0-9]{32})\b'''
keywords = ["xoxp-"]

[[patterns]]
id = "comms/slack-webhook"
group = "comms"
name = "Slack Incoming Webhook URL"
description = "Slack webhook URL. Can be abused to send phishing messages to channels."
severity = "medium"
default_enabled = true
min_entropy = 2.5
regex = '''(https://hooks\.slack\.com/services/T[A-Z0-9]{8,12}/B[A-Z0-9]{8,12}/[a-zA-Z0-9]{24})'''
keywords = ["hooks.slack.com"]

[[patterns]]
id = "comms/twilio-account-sid"
group = "comms"
name = "Twilio Account SID"
description = "Twilio account SID. Not secret alone but often leaked with auth token."
severity = "medium"
default_enabled = true
min_entropy = 3.0
regex = '''\b(AC[0-9a-fA-F]{32})\b'''
keywords = ["AC", "twilio", "TWILIO"]

[[patterns]]
id = "comms/twilio-api-key"
group = "comms"
name = "Twilio API Key SID"
description = "Twilio API key SID. Grants access to send SMS, make calls, and use Twilio services."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(SK[0-9a-fA-F]{32})\b'''
keywords = ["SK", "twilio", "TWILIO"]

# =============================================================================
# Database Credentials
# =============================================================================

[[patterns]]
id = "database/jdbc-uri"
group = "database"
name = "JDBC Connection String"
description = "JDBC URI with credentials. May access MySQL, PostgreSQL, Oracle, or SQL Server."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(jdbc:[a-z0-9+]+://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["jdbc:"]

[[patterns]]
id = "database/mongodb-uri"
group = "database"
name = "MongoDB Connection String"
description = "MongoDB URI with credentials. Grants full database read/write access."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(mongodb(?:\+srv)?://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["mongodb://", "mongodb+srv://"]

[[patterns]]
id = "database/mssql-uri"
group = "database"
name = "SQL Server Connection String"
description = "SQL Server URI with credentials. Grants database access to SQL Server instances."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(sqlserver://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["sqlserver://"]

[[patterns]]
id = "database/mysql-uri"
group = "database"
name = "MySQL Connection String"
description = "MySQL URI with credentials. Grants database access for queries and administration."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(mysql://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["mysql://"]

[[patterns]]
id = "database/postgres-uri"
group = "database"
name = "PostgreSQL Connection String"
description = "PostgreSQL URI with credentials. Grants database access for queries and schema changes."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(postgres(?:ql)?://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["postgresql://", "postgres://"]

[[patterns]]
id = "database/redis-uri"
group = "database"
name = "Redis Connection String"
description = "Redis URI with credentials. Grants access to cache data and session state."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''(rediss?://[^:]+:[^@]+@[^/\s"']+)'''
keywords = ["redis://", "rediss://"]

# =============================================================================
# Email Services
# =============================================================================

[[patterns]]
id = "email/mailgun-api-key"
group = "email"
name = "Mailgun Private API Key"
description = "Mailgun private API key. Grants full access to send emails and manage domains."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(key-[a-f0-9]{32})\b'''
keywords = ["mailgun", "MAILGUN_API"]

[[patterns]]
id = "email/mailgun-validation-key"
group = "email"
name = "Mailgun Public Validation Key"
description = "Mailgun validation key. Lower risk but enables email verification API access."
severity = "medium"
default_enabled = true
min_entropy = 3.0
regex = '''\b(pubkey-[a-f0-9]{32})\b'''
keywords = ["pubkey-"]

[[patterns]]
id = "email/sendgrid-api-key"
group = "email"
name = "SendGrid API Key"
description = "SendGrid API key (SG. prefix). Can send emails and manage email infrastructure."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(SG\.[a-zA-Z0-9_-]{20,24}\.[a-zA-Z0-9_-]{40,50})\b'''
keywords = ["SG."]

# =============================================================================
# Google Cloud Platform
# =============================================================================

[[patterns]]
id = "gcp/api-key"
group = "gcp"
name = "GCP API Key"
description = "Google Cloud API key (AIza prefix). Can access Google APIs and incur billing charges."
severity = "high"
default_enabled = true
min_entropy = 3.5
regex = '''\b(AIza[A-Za-z0-9_-]{35})\b'''
keywords = ["AIza"]

[[patterns]]
id = "gcp/oauth-client-secret"
group = "gcp"
name = "Google OAuth Client Secret"
description = "Google OAuth 2.0 client secret (GOCSPX prefix). Allows impersonating OAuth client for user tokens."
severity = "high"
default_enabled = true
min_entropy = 4.0
regex = '''\b(GOCSPX-[A-Za-z0-9_-]{20,40})\b'''
keywords = ["GOCSPX-"]

[[patterns]]
id = "gcp/service-account-key"
group = "gcp"
name = "GCP Service Account Key"
description = "GCP service account private key in JSON. Grants full access to resources the account can reach."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''"private_key"\s*:\s*"(-----BEGIN (?:RSA )?PRIVATE KEY-----\\n[A-Za-z0-9+/=\\n]+-----END (?:RSA )?PRIVATE KEY-----(?:\\n)?)"'''
keywords = ["private_key", "BEGIN PRIVATE KEY", "service_account"]

# =============================================================================
# Infrastructure Tools
# =============================================================================

[[patterns]]
id = "infra/terraform-cloud-token"
group = "infra"
name = "Terraform Cloud API Token"
description = "Terraform Cloud/Enterprise token. Grants access to infrastructure state and workspaces."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b([a-zA-Z0-9]{14,16}\.atlasv1\.[a-zA-Z0-9]{60,70})\b'''
keywords = [".atlasv1."]

[[patterns]]
id = "infra/vault-batch-token"
group = "infra"
name = "HashiCorp Vault Batch Token"
description = "Vault batch token (hvb. prefix). Lightweight token for high-volume operations."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b(hvb\.[a-zA-Z0-9_-]{24,})\b'''
keywords = ["hvb."]

[[patterns]]
id = "infra/vault-service-token"
group = "infra"
name = "HashiCorp Vault Service Token"
description = "Vault service token (hvs. prefix). Grants access to secrets and encryption keys."
severity = "critical"
default_enabled = true
min_entropy = 3.0
regex = '''\b(hvs\.[a-zA-Z0-9_-]{24,})\b'''
keywords = ["hvs."]

# =============================================================================
# Private Keys & Certificates
# =============================================================================

[[patterns]]
id = "keys/dsa-private-key"
group = "keys"
name = "DSA Private Key"
description = "DSA private key in PEM format. Legacy key type for digital signatures."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN DSA PRIVATE KEY-----[\s\S]{64,}?-----END DSA PRIVATE KEY-----'''
keywords = ["BEGIN DSA PRIVATE KEY"]

[[patterns]]
id = "keys/ec-private-key"
group = "keys"
name = "EC Private Key"
description = "Elliptic curve private key in PEM format. Used for TLS, SSH, and signing."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN EC PRIVATE KEY-----[\s\S]{64,}?-----END EC PRIVATE KEY-----'''
keywords = ["BEGIN EC PRIVATE KEY"]

[[patterns]]
id = "keys/encrypted-private-key"
group = "keys"
name = "Encrypted Private Key"
description = "Password-protected private key. Still risky if password is weak or leaked."
severity = "high"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN ENCRYPTED PRIVATE KEY-----[\s\S]{64,}?-----END ENCRYPTED PRIVATE KEY-----'''
keywords = ["BEGIN ENCRYPTED PRIVATE KEY"]

[[patterns]]
id = "keys/openssh-private-key"
group = "keys"
name = "OpenSSH Private Key"
description = "OpenSSH private key (new format). Used for SSH authentication."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----[\s\S]{64,}?-----END OPENSSH PRIVATE KEY-----'''
keywords = ["BEGIN OPENSSH PRIVATE KEY"]

[[patterns]]
id = "keys/pgp-private-key"
group = "keys"
name = "PGP Private Key Block"
description = "PGP/GPG private key. Used for email encryption and file signing."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN PGP PRIVATE KEY BLOCK-----[\s\S]{64,}?-----END PGP PRIVATE KEY BLOCK-----'''
keywords = ["BEGIN PGP PRIVATE KEY BLOCK"]

[[patterns]]
id = "keys/private-key-pkcs8"
group = "keys"
name = "PKCS#8 Private Key"
description = "Generic private key in PKCS#8 format. May contain RSA, EC, or other key types."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN PRIVATE KEY-----[\s\S]{64,}?-----END PRIVATE KEY-----'''
keywords = ["BEGIN PRIVATE KEY"]

[[patterns]]
id = "keys/putty-private-key"
group = "keys"
name = "PuTTY Private Key"
description = "PuTTY private key (PPK format). Used for SSH authentication on Windows."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''PuTTY-User-Key-File-[0-9]+:[\s\S]{40,}?Private-Lines:'''
keywords = ["PuTTY-User-Key-File"]

[[patterns]]
id = "keys/rsa-private-key"
group = "keys"
name = "RSA Private Key"
description = "RSA private key in PEM format. Enables decryption, signing, and system impersonation."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''-----BEGIN RSA PRIVATE KEY-----[\s\S]{64,}?-----END RSA PRIVATE KEY-----'''
keywords = ["BEGIN RSA PRIVATE KEY"]

[[patterns]]
id = "keys/x509-certificate-private-key"
group = "keys"
name = "Certificate with Private Key (PFX/P12)"
description = "Base64-encoded PKCS#12 file. Contains certificate and private key together."
severity = "critical"
default_enabled = true
min_entropy = 4.5
regex = '''(?i)(?:\.pfx|\.p12|pkcs12|certificate)[\s\S]{0,50}?[=:]\s*["']?([A-Za-z0-9+/]{100,}={0,2})["']?'''
keywords = [".pfx", ".p12", "pkcs12"]

# =============================================================================
# Payment Processors
# =============================================================================

[[patterns]]
id = "payments/braintree-access-token"
group = "payments"
name = "Braintree Access Token"
description = "Braintree access token. Grants access to payment processing APIs."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(access_token\$(?:production|sandbox)\$[a-z0-9]{16}\$[a-f0-9]{32})\b'''
keywords = ["access_token$"]

[[patterns]]
id = "payments/braintree-api-key"
group = "payments"
name = "Braintree Private Key"
description = "Braintree merchant private key. Used with public key for API authentication."
severity = "critical"
default_enabled = true
min_entropy = 3.5
regex = '''(?i)braintree[^\n]{0,40}private[\s_-]*key[\s]*[=:]["']?\s*([a-f0-9]{32})["']?'''
keywords = ["braintree"]

[[patterns]]
id = "payments/paypal-access-token"
group = "payments"
name = "PayPal Access Token"
description = "PayPal OAuth access token (A21AA prefix). Short-lived token for API authentication."
severity = "high"
