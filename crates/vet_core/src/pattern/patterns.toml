[groups.ai]
name = "AI Services"
remediation = "Revoke key in provider dashboard, review usage logs for unauthorised API calls."

[groups.auth]
name = "Authentication Tokens"
remediation = "Invalidate token, review access logs for unauthorised usage."

[groups.aws]
name = "Amazon Web Services"
remediation = "Rotate in IAM console immediately, review CloudTrail for unauthorised access."

[groups.azure]
name = "Microsoft Azure"
remediation = "Revoke in Azure Portal, review Activity Logs for unauthorised access."

[groups.cloud]
name = "Cloud Platforms"
remediation = "Revoke token in provider console, review for unauthorised resource access."

[groups.comms]
name = "Communication Platforms"
remediation = "Revoke in app settings, review message logs for unauthorised activity."

[groups.database]
name = "Database Credentials"
remediation = "Rotate password immediately, review access logs for unauthorised queries."

[groups.email]
name = "Email Services"
remediation = "Revoke API key, review sending logs for unauthorised emails."

[groups.gcp]
name = "Google Cloud Platform"
remediation = "Delete in GCP Console, review Cloud Audit Logs for unauthorised access."

[groups.infra]
name = "Infrastructure Tools"
remediation = "Revoke token, review audit logs for unauthorised infrastructure changes."

[groups.keys]
name = "Private Keys & Certificates"
remediation = "Revoke or rotate the key immediately, generate new key pair."

[groups.payments]
name = "Payment Processors"
remediation = "Roll API key immediately, review transaction logs for unauthorised charges."

[groups.registry]
name = "Package & Container Registries"
remediation = "Revoke token, audit published packages for unauthorised versions."

[groups.vcs]
name = "Version Control Systems"
remediation = "Revoke token immediately, review audit logs for unauthorised commits."

# =============================================================================
# AI Services
# =============================================================================

[[patterns]]
id = "ai/anthropic-api-key"
group = "ai"
name = "Anthropic API Key"
description = "Anthropic API key (sk-ant-api03- prefix). Grants access to Claude models with billing."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(sk-ant-api03-[a-zA-Z0-9_-]{80,110})\b'''
keywords = ["sk-ant-"]

[[patterns]]
id = "ai/groq-api-key"
group = "ai"
name = "Groq API Key"
description = "Groq API key (gsk_ prefix). Grants access to Groq's fast LPU inference API."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(gsk_[a-zA-Z0-9]{48})\b'''
keywords = ["gsk_"]

[[patterns]]
id = "ai/huggingface-token"
group = "ai"
name = "Hugging Face Access Token"
description = "Hugging Face token (hf_ prefix). Grants access to models, datasets, and Inference API."
severity = "high"
default_enabled = true
min_entropy = 3.5
regex = '''\b(hf_[a-zA-Z0-9]{20,})\b'''
keywords = ["hf_"]

[[patterns]]
id = "ai/openai-admin-key"
group = "ai"
name = "OpenAI Admin API Key"
description = "OpenAI admin API key (sk-admin- prefix). Grants administrative access to organisation."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(sk-admin-[a-zA-Z0-9_-]{20,})\b'''
keywords = ["sk-admin-"]

[[patterns]]
id = "ai/openai-api-key"
group = "ai"
name = "OpenAI Project API Key"
description = "OpenAI project API key (sk-proj- prefix). Grants access to OpenAI models with billing."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(sk-proj-[a-zA-Z0-9_-]{48,160})\b'''
keywords = ["sk-proj-"]

# =============================================================================
# Authentication Tokens
# =============================================================================

[[patterns]]
id = "auth/basic-auth-header"
group = "auth"
name = "Basic Auth in Authorization Header"
description = "HTTP Basic Auth header with base64-encoded credentials. Easily decoded."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''(?i)Authorization[\s]*[=:][\s]*["']?Basic\s+([A-Za-z0-9+/]{15,}={0,2})["']?'''
keywords = ["Authorization", "Basic"]

[[patterns]]
id = "auth/bearer-token"
group = "auth"
name = "Bearer Token in Authorization Header"
description = "Bearer token in HTTP Authorization header. Grants API access."
severity = "high"
default_enabled = true
min_entropy = 3.5
regex = '''(?i)Authorization[\s]*[=:][\s]*["']?Bearer\s+([A-Za-z0-9_-]{20,})["']?'''
keywords = ["Authorization"]

[[patterns]]
id = "auth/jwt-token"
group = "auth"
name = "JSON Web Token (JWT)"
description = "JWT token with encoded claims and signature. May contain sensitive session data."
severity = "medium"
default_enabled = true
min_entropy = 3.5
regex = '''\b(eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})\b'''
keywords = ["eyJ"]

# =============================================================================
# Amazon Web Services
# =============================================================================

[[patterns]]
id = "aws/access-key-id"
group = "aws"
name = "AWS Access Key ID"
description = "AWS access key ID (AKIA/ASIA/ABIA/ACCA prefix). Identifies the key pair but requires the secret key for access."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b((AKIA|ASIA|ABIA|ACCA)[A-Z2-7]{16})\b'''
keywords = ["AKIA", "ASIA", "ABIA", "ACCA"]

[[patterns]]
id = "aws/appsync-api-key"
group = "aws"
name = "AWS AppSync API Key"
description = "AWS AppSync GraphQL API key. Grants access to GraphQL APIs and underlying data sources."
severity = "high"
default_enabled = true
min_entropy = 3.0
regex = '''\b(da2-[a-z0-9]{26})\b'''
keywords = ["da2-"]

[[patterns]]
id = "aws/bedrock-api-key"
group = "aws"
name = "AWS Bedrock API Key"
description = "Long-lived API key for Amazon Bedrock AI services. Grants access to AI model invocations."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''\b(ABSK[A-Za-z0-9+/]{109,269}={0,2})\b'''
keywords = ["ABSK"]

# =============================================================================
# Microsoft Azure
# =============================================================================

[[patterns]]
id = "azure/app-insights-instrumentation-key"
group = "azure"
name = "Azure Application Insights Instrumentation Key"
description = "Application Insights instrumentation key. Low risk but could allow false telemetry injection."
severity = "low"
default_enabled = true
min_entropy = 3.0
regex = '''InstrumentationKey=([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'''
keywords = ["InstrumentationKey"]

[[patterns]]
id = "azure/service-bus-key"
group = "azure"
name = "Azure Service Bus Shared Access Key"
description = "Azure Service Bus or Event Hub key. Grants send/receive access to messaging namespace."
severity = "critical"
default_enabled = true
min_entropy = 4.0
regex = '''SharedAccessKey=([A-Za-z0-9+/]{43}=)'''
keywords = ["SharedAccessKey"]

[[patterns]]
id = "azure/storage-account-key"
group = "azure"
name = "Azure Storage Account Key"
description = "Azure Storage account key (512-bit, base64). Grants full read/write/delete access to storage account."
severity = "critical"
default_enabled = true
min_entropy = 4.5
regex = '''AccountKey=([A-Za-z0-9+/]{86}==)'''
keywords = ["AccountKey"]

[[patterns]]
id = "azure/storage-sas-token"
group = "azure"
name = "Azure Storage SAS Token"
description = "Azure SAS token with delegated storage access. Permissions depend on token configuration."
severity = "high"
default_enabled = true
min_entropy = 4.0
regex = '''[?&]sig=([A-Za-z0-9%+/]+={0,2})'''
keywords = ["sig="]

# =============================================================================
# Cloud Platforms
# =============================================================================

[[patterns]]
id = "cloud/digitalocean-oauth-token"
